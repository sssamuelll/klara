server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri $uri/ /index.html;
  }

  # The service worker drives app updates — it must never be served with the
  # long-lived immutable cache below (Safari honors it up to 24h).
  location = /sw.js {
    add_header Cache-Control "no-cache";
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
    expires 30d;
    add_header Cache-Control "public, immutable";
  }
}
