services:
  postgres:
    image: postgres:16-alpine
    container_name: klara_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-german}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-german_dev_pw}
      POSTGRES_DB: ${POSTGRES_DB:-german_app}
    ports:
      - "5432:5432"
    volumes:
      - german_app_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-german} -d ${POSTGRES_DB:-german_app}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: klara_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: development
      APP_LOG_LEVEL: INFO
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-german}:${POSTGRES_PASSWORD:-german_dev_pw}@postgres:5432/${POSTGRES_DB:-german_app}
      LLM_PROVIDER: anthropic
      LLM_STORY_MODEL: ${LLM_STORY_MODEL:-anthropic/claude-haiku-4-5-20251001}
      LLM_CHAT_MODEL: ${LLM_CHAT_MODEL:-anthropic/claude-sonnet-4-6}
      LLM_CORRECTION_MODEL: ${LLM_CORRECTION_MODEL:-anthropic/claude-haiku-4-5-20251001}
      # JSON, e.g. {"thinking": {"type": "disabled"}} for DeepSeek V4 Flash.
      # Blank when unset → Settings treats it as None (see config validator).
      LLM_CHAT_EXTRA_BODY: ${LLM_CHAT_EXTRA_BODY:-}
      LLM_STORY_EXTRA_BODY: ${LLM_STORY_EXTRA_BODY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TTS_PROVIDER: ${TTS_PROVIDER:-elevenlabs}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-EXAVITQu4vr4xnSDxMaL}
      ELEVENLABS_VOICE_ID_DE: ${ELEVENLABS_VOICE_ID_DE:-}
      ELEVENLABS_VOICE_ID_ES: ${ELEVENLABS_VOICE_ID_ES:-}
      ELEVENLABS_VOICE_ID_FR: ${ELEVENLABS_VOICE_ID_FR:-}
      ELEVENLABS_VOICE_ID_JA: ${ELEVENLABS_VOICE_ID_JA:-}
      ELEVENLABS_VOICE_ID_PT: ${ELEVENLABS_VOICE_ID_PT:-}
      ELEVENLABS_VOICE_ID_EN: ${ELEVENLABS_VOICE_ID_EN:-}
      ELEVENLABS_MODEL: ${ELEVENLABS_MODEL:-eleven_turbo_v2_5}
      INWORLD_API_KEY: ${INWORLD_API_KEY:-}
      INWORLD_VOICE_ID: ${INWORLD_VOICE_ID:-}
      INWORLD_VOICE_ID_DE: ${INWORLD_VOICE_ID_DE:-}
      INWORLD_VOICE_ID_ES: ${INWORLD_VOICE_ID_ES:-}
      INWORLD_VOICE_ID_FR: ${INWORLD_VOICE_ID_FR:-}
      INWORLD_VOICE_ID_JA: ${INWORLD_VOICE_ID_JA:-}
      INWORLD_VOICE_ID_PT: ${INWORLD_VOICE_ID_PT:-}
      INWORLD_VOICE_ID_EN: ${INWORLD_VOICE_ID_EN:-}
      INWORLD_MODEL: ${INWORLD_MODEL:-inworld-tts-1.5-mini}
      DEFAULT_USER_DISPLAY_NAME: Samuel
      DEFAULT_USER_LEVEL: A0
      DEFAULT_USER_NATIVE_LANGUAGE: es
      CORS_ORIGINS: "http://localhost:5273,http://127.0.0.1:5273"
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-dev-secret-do-not-use-in-prod-change-me-32b}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME:-klara_session}
      AUTH_COOKIE_MAX_AGE: ${AUTH_COOKIE_MAX_AGE:-2592000}
      INITIAL_OWNER_EMAIL: ${INITIAL_OWNER_EMAIL:-}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Klara <noreply@klara.app>}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:5273}
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://localhost:8000}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-eastus}
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/alembic:/app/alembic

  frontend:
    build:
      context: ./frontend
    container_name: klara_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://backend:8000
      VITE_USE_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5273:5273"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json

volumes:
  german_app_pgdata:
