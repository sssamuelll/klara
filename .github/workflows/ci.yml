name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: backend / pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: klara
          POSTGRES_PASSWORD: klara_test
          POSTGRES_DB: klara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U klara -d klara_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Sync deps
        working-directory: backend
        run: uv sync

      - name: Run pytest
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://klara:klara_test@localhost:5432/klara_test
        run: uv run pytest tests/ -v

  backend-lint:
    name: backend / ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - working-directory: backend
        run: uv sync
      - working-directory: backend
        run: uv run ruff check src tests
      - working-directory: backend
        run: uv run ruff format --check src tests

  backend-migration-roundtrip:
    name: backend / migration roundtrip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: klara
          POSTGRES_PASSWORD: klara_test
          POSTGRES_DB: klara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U klara -d klara_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - working-directory: backend
        run: uv sync
      - name: Upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://klara:klara_test@localhost:5432/klara_test
        run: uv run alembic upgrade head
      - name: Downgrade base
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://klara:klara_test@localhost:5432/klara_test
        run: uv run alembic downgrade base
      - name: Upgrade head again (verify reversibility)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://klara:klara_test@localhost:5432/klara_test
        run: uv run alembic upgrade head

  frontend-checks:
    name: frontend / typecheck + build + i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm run i18n:check
      - working-directory: frontend
        run: npm run build

  docker-build-smoke:
    name: docker / build smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: backend/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile.prod
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.dockerfile }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
