name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: backend / pytest
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: klara
          POSTGRES_PASSWORD: klara_test
          POSTGRES_DB: klara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U klara -d klara_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Sync deps
        working-directory: backend
        run: uv sync

      - name: Run pytest
        working-directory: backend
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://klara:klara_test@localhost:5432/klara_test
        run: uv run pytest tests/ -v

  backend-lint:
    name: backend / ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - working-directory: backend
        run: uv sync
      - working-directory: backend
        run: uv run ruff check src tests
      - working-directory: backend
        run: uv run ruff format --check src tests

  backend-migration-roundtrip:
    name: backend / migration roundtrip
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: klara
          POSTGRES_PASSWORD: klara_test
          POSTGRES_DB: klara_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U klara -d klara_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: latest
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"
      - working-directory: backend
        run: uv sync
      - name: Upgrade head
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://klara:klara_test@localhost:5432/klara_test
        run: uv run alembic upgrade head
      - name: Downgrade base
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://klara:klara_test@localhost:5432/klara_test
        run: uv run alembic downgrade base
      - name: Upgrade head again (verify reversibility)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://klara:klara_test@localhost:5432/klara_test
        run: uv run alembic upgrade head

      # Prod runs Alembic with a passwordless DSN + out-of-band DB_PASSWORD
      # (issue #81). Exercise that exact path explicitly so it has a
      # refactor-proof guard, independent of the pytest fixtures.
      - name: Roundtrip via out-of-band password (prod-representative)
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://klara@localhost:5432/klara_test
          DB_PASSWORD: klara_test
        run: |
          uv run alembic downgrade base
          uv run alembic upgrade head

  frontend-checks:
    name: frontend / typecheck + build + i18n
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run typecheck
      - working-directory: frontend
        run: npm run i18n:check
      - working-directory: frontend
        run: npm run test
      - working-directory: frontend
        run: npm run build

  docker-build-smoke:
    name: docker / build smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: backend/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile.prod
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Build ${{ matrix.service }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.dockerfile }}
          push: false
          load: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
