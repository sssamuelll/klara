services:
  postgres:
    ports: !reset []
    restart: unless-stopped

  backend:
    image: ghcr.io/sssamuelll/klara-backend:${IMAGE_TAG:-latest}
    build: !reset {}
    environment:
      APP_ENV: production
      CORS_ORIGINS: "https://klara.sdar.dev"
      FRONTEND_BASE_URL: "https://klara.sdar.dev"
      BACKEND_BASE_URL: "https://klara.sdar.dev"
    ports: !override
      - "127.0.0.1:8210:8000"
    volumes: !reset []
    command: ["sh", "-c", "alembic upgrade head && uvicorn klara.main:app --host 0.0.0.0 --port 8000"]

  frontend:
    image: ghcr.io/sssamuelll/klara-frontend:${IMAGE_TAG:-latest}
    build: !reset {}
    environment: !reset {}
    ports: !override
      - "127.0.0.1:8211:80"
    volumes: !reset []
